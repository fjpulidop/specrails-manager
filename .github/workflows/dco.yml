name: DCO

on:
  pull_request:
    branches: [main]

jobs:
  dco-check:
    name: DCO Sign-off Check
    runs-on: ubuntu-latest
    # Skip DCO check for Dependabot and other automated bots
    if: github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.user.login != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify DCO sign-off on all PR commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          MISSING=0
          while IFS= read -r commit; do
            author_email=$(git log --format=%ae -n 1 "$commit")
            author_name=$(git log --format=%an -n 1 "$commit")
            subject=$(git log --format='%s' -n 1 "$commit")
            parent_count=$(git cat-file -p "$commit" | grep -c "^parent " || true)

            # Skip merge commits (automated merge commits don't require DCO)
            if [ "$parent_count" -gt 1 ]; then
              echo "SKIP (merge commit): $commit — $subject"
              continue
            fi

            # Skip known bot accounts (release-please, github-actions, dependabot)
            if echo "$author_email" | grep -qE "(bot@|noreply@github\.com|github-actions\[bot\]|dependabot\[bot\]|users\.noreply\.github\.com)"; then
              echo "SKIP (bot): $commit — $subject ($author_name <$author_email>)"
              continue
            fi

            message=$(git log --format=%B -n 1 "$commit")
            if ! echo "$message" | grep -qE "^Signed-off-by: .+ <.+@.+>$"; then
              echo "ERROR: Commit $commit is missing a 'Signed-off-by:' sign-off."
              echo "  Subject: $subject"
              echo "  Author:  $author_name <$author_email>"
              MISSING=1
            fi
          done < <(git rev-list "$BASE_SHA".."$HEAD_SHA")

          if [ "$MISSING" -eq 1 ]; then
            echo ""
            echo "One or more commits are missing a DCO sign-off."
            echo "Fix the most recent commit:  git commit --amend -s --no-edit"
            echo "Fix multiple commits:         git rebase --signoff HEAD~<n>"
            echo "See CONTRIBUTING.md for full instructions."
            exit 1
          fi

          echo "All commits have a valid DCO sign-off."
