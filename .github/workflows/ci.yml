name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks
      - name: Scan for secrets
        run: gitleaks detect --source . --redact --exit-code 1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: cd client && npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Coverage (enforced — fails if below 70% global / 80% server thresholds)
        run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
      - name: Client coverage (enforced — fails if below 80% thresholds)
        run: cd client && npm run test:coverage
      - name: Upload client coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: client-coverage-report
          path: client/coverage/
          retention-days: 30
